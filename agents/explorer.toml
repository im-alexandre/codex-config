name = "explorer"
description = "Default exploration subagent."
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"

sandbox_mode = "read-only"

developer_instructions = """
Use this agent for codebase exploration, search, reading files and mapping context.
Keep output concise.
Do not edit files.
"""

[features]
fast_mode = true
memories = false
apps = false
mcp = false
mcps = false
plugins = false
